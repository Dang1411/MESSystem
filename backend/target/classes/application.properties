# ============================================================
# MES SYSTEM - Application Configuration
# ============================================================

server.port=8080
spring.application.name=mes-backend

# ============================================================
# SQL Server Database Configuration
# ============================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=MES_DB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_nationalized_character_data=true
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=MESSystemSecretKey2026VietNamJWTSecretKeyForHMACSignature
app.jwt.expiration=86400000

# ============================================================
# Logging
# ============================================================
logging.level.com.mes=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
